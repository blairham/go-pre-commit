version: 2

# GoReleaser configuration for go-pre-commit
# See: https://goreleaser.com
project_name: pre-commit

builds:
- id: pre-commit
  binary: pre-commit
  main: ./cmd/pre-commit
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  - windows
  - freebsd
  goarch:
  - amd64
  - arm64
  - "386"
  - arm
  goarm:
  - "6"
  - "7"
  ignore:
  - goos: darwin
    goarch: "386"
  - goos: darwin
    goarch: arm
  - goos: windows
    goarch: arm64
  - goos: windows
    goarch: arm
  - goos: freebsd
    goarch: "386"
  - goos: freebsd
    goarch: arm
  ldflags:
  - -s -w
  - -X github.com/blairham/go-pre-commit/v4/internal/config.Version={{.Version}}
  - -X main.commit={{.Commit}}
  - -X main.date={{.Date}}

archives:
- id: default
  formats:
  - tar.gz
  # this name template makes the OS and Arch compatible with the results of uname.
  name_template: >-
    {{ .ProjectName }}_ {{- title .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }} {{- if .Arm }}v{{ .Arm }}{{ end }}
  format_overrides:
  - goos: windows
    formats:
    - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
  - title: Features
    regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
    order: 0
  - title: Bug Fixes
    regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
    order: 1
  - title: Other
    order: 999
  filters:
    exclude:
    - '^docs:'
    - '^test:'
    - '^chore:'

homebrew_casks:
- name: pre-commit
  repository:
    owner: blairham
    name: homebrew-tap
    token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
  homepage: https://github.com/blairham/go-pre-commit
  description: A fast Go reimplementation of pre-commit
  license: Apache-2.0

release:
  draft: false
  replace_existing_draft: true
  target_commitish: "{{ .Commit }}"
  prerelease: auto
  mode: replace
  header: |
    ## go-pre-commit {{ .Tag }} ({{ .Date }})

    Welcome to this new release!

  footer: |
    **Full Changelog**: https://github.com/blairham/go-pre-commit/compare/{{ .PreviousTag }}...{{ .Tag }}

  extra_files:
  - glob: ./README.md

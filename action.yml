name: go-pre-commit
description: >-
  Install go-pre-commit (a fast Go reimplementation of pre-commit) and run
  hooks. Drop-in replacement for pre-commit/action with no Python setup.
author: blairham
branding:
  icon: check-circle
  color: green

inputs:
  version:
    description: >-
      Release of go-pre-commit to install (e.g. "v4.5.4"), or "latest".
    required: false
    default: latest
  extra_args:
    description: Extra arguments passed to `pre-commit run`.
    required: false
    default: --all-files
  cache:
    description: Cache hook environments (~/.cache/pre-commit) between runs.
    required: false
    default: 'true'
  install-only:
    description: >-
      Install the binary onto PATH (and optionally cache) but skip the
      `pre-commit run` step. For workflows that drive pre-commit themselves
      (diff-scoped runs, `install-hooks` cache seeding, custom log capture).
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install go-pre-commit
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        case "$RUNNER_OS" in
          Linux)   os=Linux ;;
          macOS)   os=Darwin ;;
          Windows) os=Windows ;;
          *) echo "Unsupported OS: $RUNNER_OS" >&2; exit 1 ;;
        esac

        case "$RUNNER_ARCH" in
          X64)   arch=x86_64 ;;
          ARM64) arch=arm64 ;;
          X86)   arch=i386 ;;
          *) echo "Unsupported architecture: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        ext=tar.gz
        if [ "$os" = Windows ]; then ext=zip; fi
        archive="pre-commit_${os}_${arch}.${ext}"

        if [ "$VERSION" = latest ]; then
          base="https://github.com/blairham/go-pre-commit/releases/latest/download"
        else
          case "$VERSION" in
            v*) tag="$VERSION" ;;
            *)  tag="v$VERSION" ;;
          esac
          base="https://github.com/blairham/go-pre-commit/releases/download/${tag}"
        fi

        dir="${RUNNER_TEMP}/go-pre-commit"
        mkdir -p "$dir"
        cd "$dir"

        curl -fsSL --retry 3 -O "${base}/${archive}"
        curl -fsSL --retry 3 -O "${base}/checksums.txt"
        if command -v sha256sum >/dev/null 2>&1; then
          grep " ${archive}\$" checksums.txt | sha256sum -c -
        else
          grep " ${archive}\$" checksums.txt | shasum -a 256 -c -
        fi

        if [ "$ext" = zip ]; then
          7z x -y "$archive" >/dev/null
        else
          tar -xzf "$archive"
        fi

        echo "$dir" >> "$GITHUB_PATH"
        "$dir/pre-commit" --version

    - name: Cache hook environments
      if: inputs.cache == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cache/pre-commit
        key: go-pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Run pre-commit
      if: inputs.install-only != 'true'
      shell: bash
      run: pre-commit run --show-diff-on-failure --color=always ${{ inputs.extra_args }}

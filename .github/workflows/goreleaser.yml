name: Release

on:
  push:
    tags:
    - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Checkout tag (workflow_dispatch)
      if: github.event_name == 'workflow_dispatch'
      run: git checkout "refs/tags/${{ inputs.tag }}"

    - name: Run tests
      run: make test

    - name: Install rcodesign
      run: |
        set -euo pipefail
        VERSION="0.29.0"
        URL="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${VERSION}/apple-codesign-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
        curl -fsSL "$URL" -o /tmp/rcodesign.tar.gz
        tar -xzf /tmp/rcodesign.tar.gz -C /tmp
        sudo install -m 0755 /tmp/apple-codesign-${VERSION}-x86_64-unknown-linux-musl/rcodesign /usr/local/bin/rcodesign
        rcodesign --version

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
        MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
        MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
        MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

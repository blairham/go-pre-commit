# golangci-lint v2 configuration for go-pre-commit
# See: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true
      colors: true

linters:
  enable:
  - errcheck
  - govet
  - ineffassign
  - staticcheck
  - unused
  - misspell
  - unconvert
  - gocritic
  - revive

  exclusions:
    rules:
    - path: _test\.go
      linters:
      - errcheck
      - gocritic
      - revive

    - path: cmd/
      linters:
      - errcheck

  settings:
    misspell:
      locale: US

    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
      - os.Setenv
      - os.Unsetenv
      - os.Remove
      - os.RemoveAll
      - os.MkdirAll
      - os.WriteFile
      - (os.File).Close
      - (*os.File).Close
      - (*os/exec.Cmd).Run
      - fmt.Fprintf
      - fmt.Fprintln
      - syscall.Flock

    govet:
      disable:
      - shadow

    gocritic:
      enabled-tags:
      - diagnostic
      - performance
      disabled-checks:
      - hugeParam
      - rangeValCopy
      - ifElseChain
      - commentedOutCode
      - appendCombine

    revive:
      severity: warning
      rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: superfluous-else
      - name: unreachable-code

formatters:
  enable:
  - gofmt
  - goimports

  settings:
    goimports:
      local-prefixes:
      - github.com/blairham/go-pre-commit

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

# Gitleaks configuration for go-pre-commit
# This file defines rules for the gitleaks security scanner

title = "go-pre-commit Gitleaks Configuration"

[extend]
# Extend the default gitleaks configuration
useDefault = true

# Global allowlist for false positives in test fixtures.
[allowlist]
description = "Global allowlist for false positives"

# Files to ignore completely
paths = [
    # Test files often contain fake/example credentials
    '''.*_test\.go''',
    # Build output
    '''^build/''',
    # Vendored dependencies
    '''^vendor/''',
]
